version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: devlens-postgres
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: devlens_secure_password
      POSTGRES_DB: devlens_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: devlens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devlens-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://devlens:devlens_secure_password@postgres:5432/devlens_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_change_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devlens-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm start

  # Python ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: devlens-ml
    environment:
      DATABASE_URL: postgresql://devlens:devlens_secure_password@postgres:5432/devlens_db
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml-service/src:/app/src
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Assessment Engine Sandbox
  sandbox:
    build:
      context: ./assessment-engine/sandbox
      dockerfile: Dockerfile
    container_name: devlens-sandbox
    environment:
      PORT: 9000
    ports:
      - "9000:9000"
    volumes:
      - ./assessment-engine/sandbox:/app
    command: node server.js

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: devlens-network
